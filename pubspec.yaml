name: witsgame
description: "Tahmin.io - Wits & Wagers style party game"
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.0

  # State Management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^14.8.1

  # Utils
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  flutter_animate: ^4.5.2
  audioplayers: ^6.0.0
  shared_preferences: ^2.5.3
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: RehnCondensed
      fonts:
        - asset: assets/Rehn Condensed W03 ExtraBold.ttf
  assets:
    - assets/
